apiVersion: v1
kind: Namespace
metadata:
  name: artifact-simulator
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: artifact-simulator-frontend-nginx
  namespace: artifact-simulator
data:
  default.conf: |
    server {
        listen 80;
        listen [::]:80;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        location /api/ {
            proxy_pass http://artifact-backend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: artifact-simulator-frontend
  namespace: artifact-simulator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: artifact-simulator-frontend
  template:
    metadata:
      labels:
        app: artifact-simulator-frontend
    spec:
      containers:
        - name: artifact-simulator-frontend
          image: artifact-simulator-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
      volumes:
        - name: nginx-config
          configMap:
            name: artifact-simulator-frontend-nginx
---
apiVersion: v1
kind: Service
metadata:
  name: artifact-simulator-frontend
  namespace: artifact-simulator
spec:
  selector:
    app: artifact-simulator-frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: artifact-simulator-frontend
  namespace: artifact-simulator
spec:
  rules:
    - host: artifact.katumon.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: artifact-simulator-frontend
                port:
                  number: 80
